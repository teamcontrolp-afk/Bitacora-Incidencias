<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bitácora de Incidencias 2026</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#071830;color:#e0f2fe}
header{background:#0d2b5e;padding:16px 26px;font-weight:700}
.controls{padding:16px 26px}
button{background:#1e88e5;border:0;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer}
button:hover{background:#1565c0}
.status{margin-left:12px;font-size:13px}
.ok{color:#34d399}
.err{color:#f87171}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
th{background:#103766;font-size:10px;text-transform:uppercase}
</style>
</head>

<body>

<header>BITÁCORA DE INCIDENCIAS — Control de Producción 2026</header>

<div class="controls">
  <button onclick="cargarDatos()">↻ Actualizar</button>
  <span id="estado" class="status">—</span>
</div>

<table>
<thead>
<tr>
  <th>#</th>
  <th>Fecha evento</th>
  <th>Prioridad</th>
  <th>Tipo</th>
  <th>Área</th>
  <th>Línea</th>
  <th>Detalle</th>
  <th>Estado</th>
  <th>Usuario</th>
  <th>Fecha registro</th>
  <th>Hora</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="11">Cargando…</td></tr>
</tbody>
</table>

<script>
const API_URL =
'https://script.google.com/macros/s/AKfycbwjBQxuBiBr6_rVuVaj626XriLMhX5mdG5nb635UEUHZ7DVA3MpR2fq1fUcS33shM2R/exec';

function cargarDatos(){
  const estado = document.getElementById('estado');
  const tbody = document.getElementById('tbody');
  estado.textContent = 'Conectando…';
  estado.className = 'status';

  const cb = 'cb_' + Date.now();
  let finished = false;

  window[cb] = function(json){
    finished = true;
    delete window[cb];
    script.remove();

    if(!json || !json.ok){
      mostrarError();
      return;
    }

    const data = json.data || [];
    if(!data.length){
      tbody.innerHTML = '<tr><td colspan="11">No hay registros</td></tr>';
    } else {
      tbody.innerHTML = data.map(r=>`
        <tr>
          <td>${r.ID}</td>
          <td>${r.Fecha}</td>
          <td>${r.Prioridad}</td>
          <td>${r.Tipo}</td>
          <td>${r.Area}</td>
          <td>${r.Linea}</td>
          <td>${r.Detalle}</td>
          <td>${r.Estado}</td>
          <td>${r.Usuario}</td>
          <td>${r.HoraRegistro}</td>
          <td>${r.HoraRegistro}</td>
        </tr>
      `).join('');
    }

    estado.textContent = 'Conectado';
    estado.classList.add('ok');
  };

  const script = document.createElement('script');
  script.src = API_URL + '?callback=' + cb;
  document.body.appendChild(script);

  // ⏱️ timeout real (no script.onerror)
  setTimeout(()=>{
    if(!finished){
      mostrarError();
    }
  }, 8000);
}

function mostrarError(){
  document.getElementById('estado').textContent = 'Error de conexión';
  document.getElementById('estado').className = 'status err';
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="11" class="err">Error al cargar datos desde Google Sheets</td></tr>';
}

cargarDatos();
</script>

</body>
</html>
