<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bitácora de Incidencias 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#071830;
  color:#e0f2fe;
}
header{
  background:#0d2b5e;
  padding:16px 26px;
  font-weight:700;
  letter-spacing:.08em;
}
.controls{
  padding:18px 26px;
}
button{
  background:#1e88e5;
  border:none;
  color:#fff;
  padding:8px 16px;
  border-radius:6px;
  cursor:pointer;
}
button:hover{background:#1565c0}
.status{
  margin-left:14px;
  font-size:13px;
}
.status.ok{color:#34d399}
.status.err{color:#f87171}
.table-wrap{
  padding:0 26px 28px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
thead th{
  background:#103766;
  color:#bae6fd;
  text-align:left;
  padding:10px;
  font-size:10px;
  text-transform:uppercase;
  border-bottom:1px solid #1e40af;
}
tbody td{
  padding:9px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
tbody tr:hover td{
  background:rgba(255,255,255,.04);
}
.err-row{
  color:#f87171;
  text-align:center;
}
</style>
</head>

<body>

<header>
  BITÁCORA DE INCIDENCIAS — Control de Producción 2026
</header>

<div class="controls">
  <button onclick="cargarDatos()">↻ Actualizar</button>
  <span id="estado" class="status">—</span>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Fecha evento</th>
      <th>Prioridad</th>
      <th>Tipo</th>
      <th>Área</th>
      <th>Línea</th>
      <th>Detalle</th>
      <th>Estado</th>
      <th>Usuario</th>
      <th>Fecha registro</th>
      <th>Hora</th>
    </tr>
  </thead>
  <tbody id="tbody">
    <tr><td colspan="11">Cargando…</td></tr>
  </tbody>
</table>
</div>

<script>
// ✅ URL CORRECTA DE TU BACKEND (JSONP)
const API_URL =
'https://script.google.com/macros/s/AKfycbwjBQxuBiBr6_rVuVaj626XriLMhX5mdG5nb635UEUHZ7DVA3MpR2fq1fUcS33shM2R/exec';

function fmtFecha(v){
  if(!v) return '';
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString('es-AR');
}

function fmtHora(v){
  if(!v) return '';
  const d = new Date(v);
  return isNaN(d) ? '' : d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

function cargarDatos(){
  const estado = document.getElementById('estado');
  const tbody = document.getElementById('tbody');

  estado.textContent = 'Conectando…';
  estado.className = 'status';

  const cb = 'cb_' + Date.now();

  window[cb] = function(json){
    try{
      delete window[cb];
      script.remove();

      if(!json || !json.ok){
        throw new Error('Respuesta inválida');
      }

      const data = json.data || [];

      if(data.length === 0){
        tbody.innerHTML =
          '<tr><td colspan="11">No hay registros</td></tr>';
        estado.textContent = 'Conectado';
        estado.classList.add('ok');
        return;
      }

      // ✅ USO EXACTO DE LAS CLAVES REALES
      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${r.ID ?? ''}</td>
          <td>${fmtFecha(r.Fecha)}</td>
          <td>${r.Prioridad ?? ''}</td>
          <td>${r.Tipo ?? ''}</td>
          <td>${r.Area ?? ''}</td>
          <td>${r.Linea ?? ''}</td>
          <td>${r.Detalle ?? ''}</td>
          <td>${r.Estado ?? ''}</td>
          <td>${r.Usuario ?? ''}</td>
          <td>${fmtFecha(r.HoraRegistro)}</td>
          <td>${fmtHora(r.HoraRegistro)}</td>
        </tr>
      `).join('');

      estado.textContent = 'Conectado';
      estado.classList.add('ok');

    }catch(e){
      mostrarError();
    }
  };

  const script = document.createElement('script');
  script.src = API_URL + '?callback=' + cb;
  script.onerror = mostrarError;
  document.body.appendChild(script);
}

function mostrarError(){
  document.getElementById('estado').textContent = 'Error de conexión';
  document.getElementById('estado').className = 'status err';
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="11" class="err-row">Error al cargar datos desde Google Sheets</td></tr>';
}

// carga inicial
cargarDatos();
</script>

</body>
</html>
