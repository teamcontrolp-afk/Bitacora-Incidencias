<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bitácora Firebase</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#071830;color:#e0f2fe;margin:0;padding:20px}
input,textarea,button{width:100%;margin-top:8px;padding:8px}
button{background:#1e88e5;color:#fff;border:0;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border-bottom:1px solid #234;padding:6px;font-size:12px}
th{background:#123}
</style>
</head>
<body>

<h2>Bitácora de Incidencias (Firebase)</h2>

<input id="usuario" placeholder="Usuario">
<input id="fecha" type="date">
<input id="prioridad" placeholder="Prioridad">
<input id="area" placeholder="Área">
<input id="linea" placeholder="Línea">
<textarea id="detalle" placeholder="Detalle"></textarea>

<button onclick="guardar()">Guardar registro</button>

<h3>Historial</h3>
<table>
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Prioridad</th>
      <th>Área</th>
      <th>Línea</th>
      <th>Detalle</th>
      <th>Usuario</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } 
  from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// ✅ TU CONFIG REAL
const firebaseConfig = {
  apiKey: "AIzaSy6DUqJ2F5XI6EdNBAW6tX79qMM40G8hw",
  authDomain: "bitacorainc.firebaseapp.com",
  projectId: "bitacorainc",
  storageBucket: "bitacorainc.firebasestorage.app",
  messagingSenderId: "943929074140",
  appId: "1:943929074140:web:140cfe90f8fe3a35b7639"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// guardar
window.guardar = async () => {
  await addDoc(collection(db, "incidencias"), {
    usuario: usuario.value,
    fecha: fecha.value,
    prioridad: prioridad.value,
    area: area.value,
    linea: linea.value,
    detalle: detalle.value,
    createdAt: new Date()
  });
  cargar();
};

// cargar historial
async function cargar(){
  const q = query(collection(db, "incidencias"), orderBy("createdAt","desc"));
  const snap = await getDocs(q);
  tbody.innerHTML = snap.docs.map(d=>{
    const r = d.data();
    return `<tr>
      <td>${r.fecha}</td>
      <td>${r.prioridad}</td>
      <td>${r.area}</td>
      <td>${r.linea}</td>
      <td>${r.detalle}</td>
      <td>${r.usuario}</td>
    </tr>`;
  }).join("");
}

cargar();
</script>

</body>
</html>
