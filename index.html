<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Bitácora de Incidencias 2026</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
body{margin:0;font-family:Arial;background:#081a33;color:#e5f2ff}
header{background:#0b2f60;padding:14px 24px;font-weight:700}
.container{padding:20px}
button{background:#1e88e5;border:0;color:#fff;padding:8px 14px;border-radius:4px;cursor:pointer}
button:hover{background:#1565c0}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px}
th,td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.12)}
th{background:#103b74;font-size:11px;text-transform:uppercase}
.ok{color:#2ecc71}
.err{color:#ff6b6b}
</style>
</head>

<body>
<header>BITÁCORA DE INCIDENCIAS — Control de Producción</header>

<div class="container">
  <button onclick="cargarDatos()">↻ Actualizar</button>
  <span id="estado" style="margin-left:12px"></span>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Fecha evento</th>
        <th>Prioridad</th>
        <th>Tipo</th>
        <th>Área</th>
        <th>Línea</th>
        <th>Detalle</th>
        <th>Estado</th>
        <th>Usuario</th>
        <th>Fecha registro</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="10">Cargando…</td></tr>
    </tbody>
  </table>
</div>

<script>
/* ✅ TU BACKEND */
const API_URL =
'https://script.google.com/macros/s/AKfycbyCfe0D7GCn7s8Gmh0JRK4sFnPPQKd1nCVnRmREOLrvHPyRgkatmW_ApDraaG-hA8qh4Q/exec';

function cargarDatos(){
  const estado = document.getElementById('estado');
  const tbody = document.getElementById('tbody');
  estado.textContent = 'Conectando…';

  const cb = 'cb_' + Date.now();

  window[cb] = function(json){
    try{
      delete window[cb];
      script.remove();

      if(!json || !json.ok){
        mostrarError();
        return;
      }

      const data = json.data || [];
      if(!data.length){
        tbody.innerHTML =
          '<tr><td colspan="10">No hay registros</td></tr>';
        estado.innerHTML='<span class="ok">Conectado</span>';
        return;
      }

      tbody.innerHTML = data.map(r=>`
        <tr>
          <td>${r.ID??''}</td>
          <td>${r.Fecha??''}</td>
          <td>${r.Prioridad??''}</td>
          <td>${r.Tipo??''}</td>
          <td>${r.Area??''}</td>
          <td>${r.Linea??''}</td>
          <td>${r.Detalle??''}</td>
          <td>${r.Estado??''}</td>
          <td>${r.Usuario??''}</td>
          <td>${r.HoraRegistro??''}</td>
        </tr>
      `).join('');

      estado.innerHTML='<span class="ok">Conectado</span>';
    }catch(e){
      mostrarError();
    }
  };

  const script = document.createElement('script');
  script.src = API_URL + '?callback=' + cb;
  script.onerror = mostrarError;

  document.body.appendChild(script);
}

function mostrarError(){
  document.getElementById('estado').innerHTML =
    '<span class="err">Error de conexión</span>';
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="10" class="err">Error al cargar Google Sheets</td></tr>';
}

cargarDatos();
</script>
</body>
</html>
